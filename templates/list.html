{% extends 'base.html' %}
{% block content %}
    <table class="table table-bordered" width="100%">
        <th>タイトル</th>
        <th>カテゴリー</th>
        <th>作成日</th>
        <th>最終更新日</th>
        {% for post in all_post %}
            <tr>
                <td><a href="/detail/{{ post.id }}">{{ post.subject }}</a></td>
                <td>
                    {% for category in post.category.all %}
                        <span class="badge badge-secondary"
                              onclick="location.href='/?category={{ category.id }}'">{{ category }}</span>
                    {% endfor %}
                </td>
                <td>{{ post.created }}</td>
                <td>{{ post.modified }}</td>
            </tr>

        {% endfor %}
    </table>
{% endblock %}
